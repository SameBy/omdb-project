<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vizio - Premium Cinema Experience</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2 class="logo">VIZ<span>IO</span></h2>
            
            <div class="filter-section">
                <h3><i class="fa-solid fa-sliders"></i> CONTROL PANEL</h3>
                
                <div class="filter-group">
                    <label for="sort-filter">Sort By</label>
                    <select id="sort-filter">
                        <option value="default">Recommended</option>
                        <option value="year-desc">Newest to Oldest</option>
                        <option value="year-asc">Oldest to Newest</option>
                        <option value="imdb-desc">Highest IMDb Rating</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label class="switch-label">
                        <span class="kids-text"><i class="fa-solid fa-face-smile"></i> Kids Mode</span>
                        <div class="toggle-switch">
                            <input type="checkbox" id="kids-mode">
                            <span class="slider"></span>
                        </div>
                    </label>
                </div>

                <div class="filter-group">
                    <label for="type-filter">Content Type</label>
                    <select id="type-filter">
                        <option value="">All</option>
                        <option value="movie">Movies Only</option>
                        <option value="series">Series Only</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="genre-filter">Genre</label>
                    <select id="genre-filter">
                        <option value="">All Genres</option>
                        <option value="Action">Action</option>
                        <option value="Comedy">Comedy</option>
                        <option value="Drama">Drama</option>
                        <option value="Horror">Horror</option>
                        <option value="Sci-Fi">Sci-Fi</option>
                        <option value="Animation">Animation</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label>Year Range</label>
                    <div style="display: flex; gap: 8px;">
                        <input type="number" id="min-year" placeholder="Min" class="year-input">
                        <input type="number" id="max-year" placeholder="Max" class="year-input">
                    </div>
                </div>

                <div class="filter-group">
                    <label for="imdb-filter">Min. IMDb: <span id="imdb-display" class="accent-text">1.0</span></label>
                    <input type="range" id="imdb-filter" min="1" max="10" step="0.1" value="1">
                </div>

                <div class="filter-group" style="margin-top: 2rem;">
                    <button id="apply-filters-btn" class="apply-btn">
                        <i class="fa-solid fa-check"></i> Apply Filters
                    </button>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header>
                <div class="search-container">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="search-input" placeholder="Search for movies, series, or actors..." autocomplete="off">
                    </div>
                </div>
            </header>

            <section class="results-section">
                <h2 id="default-title" style="margin-bottom: 2rem; border-left: 4px solid var(--accent); padding-left: 1rem; font-size: 1.5rem; letter-spacing: 1px;">🔥 Best Picks</h2>
                <div id="message-container" class="message"></div>
                <div id="movie-grid" class="grid hidden"></div>
            </section>
        </main>
    </div>
    
    <script src="movies.js"></script>
    <script src="app.js"></script>
</body>
</html>
